name: EGS replay verification

on:
  pull_request:
    paths:
      - 'governance/execution_substrate/egs_v1_0/**'
      - '.github/workflows/egs-replay.yml'
  workflow_dispatch:

jobs:
  egs-replay:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run EGS pytest replay
        run: |
          python -m pip install --upgrade pip pytest
          python -m pytest governance/execution_substrate/egs_v1_0/tests -v

      - name: Recompute EGS SHA-256 manifest
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib

          root = Path('governance/execution_substrate/egs_v1_0')
          targets = [
              root / 'specs' / 'synthesis_state_machine.yaml',
              root / 'specs' / 'execution_token.schema.json',
              root / 'specs' / 'transition_table.md',
              root / 'specs' / 'sm.py',
              root / 'specs' / 'exec_token.py',
          ]
          lines = []
          for path in targets:
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              lines.append(f'{digest}  {path.as_posix()}')
          manifest = root / 'receipts' / 'EGS_v1_0.sha256'
          manifest.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print(manifest.read_text(encoding='utf-8'))
          PY

      - name: Guard receipt status against stale verification claim
        run: |
          python - <<'PY'
          from pathlib import Path
          receipt = Path('governance/execution_substrate/egs_v1_0/receipts/EGS_v1_0_draft_receipt.md')
          text = receipt.read_text(encoding='utf-8')
          claims_verified = 'VERIFIED' in text and 'NOT PRODUCTION LOAD-BEARING' not in text
          has_hash_block = 'EGS_v1_0.sha256' in text and 'CI replay' in text
          if claims_verified and not has_hash_block:
              raise SystemExit('Receipt claims VERIFIED without CI replay/hash manifest reference.')
          print('Receipt status guard passed: no unsupported VERIFIED claim detected.')
          PY

      - name: Upload EGS SHA-256 manifest
        uses: actions/upload-artifact@v4
        with:
          name: EGS_v1_0_sha256_manifest
          path: governance/execution_substrate/egs_v1_0/receipts/EGS_v1_0.sha256

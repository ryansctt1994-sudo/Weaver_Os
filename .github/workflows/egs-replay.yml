name: EGS replay verification

on:
  pull_request:
    paths:
      - 'governance/execution_substrate/egs_v1_0/**'
      - '.github/workflows/egs-replay.yml'
  workflow_dispatch:

jobs:
  egs-replay:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run EGS pytest replay
        run: |
          python -m pip install --upgrade pip pytest
          python -m pytest governance/execution_substrate/egs_v1_0/tests -v

      - name: Recompute and verify EGS receipt hash binding
        run: |
          python governance/execution_substrate/egs_v1_0/receipts/verify_receipt_hashes.py

      - name: Upload EGS SHA-256 manifest
        uses: actions/upload-artifact@v4
        with:
          name: EGS_v1_0_sha256_manifest
          path: governance/execution_substrate/egs_v1_0/receipts/EGS_v1_0.sha256

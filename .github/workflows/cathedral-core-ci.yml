name: cathedral-core-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [cathedral-mvp0-skeleton]

jobs:
  cathedral-core-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Cathedral MVP-0 tests
        run: python -m pytest tests/cathedral_core -v

      - name: Print MVP-0 foundation hashes
        run: |
          sha256sum \
            cathedral_core/lumen/authority_fsm.py \
            cathedral_core/lumen/scope_sovereignty.py \
            cathedral_core/witness/qgs.py \
            cathedral_core/witness/governance_debt.py \
            cathedral_core/witness/receipt.py \
            cathedral_core/constitution_loader.py \
            constitution/negative_invariants.yaml

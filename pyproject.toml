[project]
name = "weaver-os"
version = "0.1.0"
description = "Deterministic verification and replay substrate for bounded probabilistic cognition."
requires-python = ">=3.10"
dependencies = [
  "cryptography>=42.0.0",
  "jsonschema>=4.0.0"
]

[project.optional-dependencies]
dev = [
  "pytest>=7.0.0"
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
